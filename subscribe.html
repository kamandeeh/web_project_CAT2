<!DOCTYPE html>
<html lang="en">
<head>

<!-- Character encoding -->
<meta charset="UTF-8">

<!-- Makes the page responsive -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Page title -->
<title>Subscribe – The Cannon Post</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>

/* Reset default spacing */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* Page styling */
body{
    background:#111;
    color:#fff;
    font-family:'Inter',sans-serif;
    display:flex;
    flex-direction:column;
    min-height:100vh;
}

/* Header */
header{
    background:#000;
    padding:20px;
    text-align:center;
    border-bottom:3px solid #e01020;
}

/* Logo */
header a{
    text-decoration:none;
    color:#fff;
    font-family:'Oswald',sans-serif;
    font-size:30px;
}

/* Red logo text */
header span{
    color:#e01020;
}

/* Centers the card */
.page{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* Subscription card */
.card{
    width:400px;
    background:#1a1a1a;
    padding:30px;
    border-top:3px solid #e01020;
}

/* Main heading */
.card h1{
    font-family:'Oswald',sans-serif;
    margin-bottom:10px;
    text-align:center;
}

/* Description */
.card p{
    color:#aaa;
    text-align:center;
    margin-bottom:25px;
}

/* Subscription plan */
.plan{
    background:#222;
    padding:15px;
    margin-bottom:20px;
    border-left:4px solid #e01020;
}

/* Plan title */
.plan h2{
    font-family:'Oswald',sans-serif;
    margin-bottom:5px;
}

/* Benefits list */
.plan ul{
    margin-left:20px;
    color:#ccc;
}

/* Labels */
label{
    display:block;
    margin-bottom:5px;
}

/* Input boxes */
input{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    background:#222;
    color:#fff;
    border:1px solid #444;
}

/* Input when selected */
input:focus{
    outline:none;
    border-color:#e01020;
}

/* Subscribe button */
button{
    width:100%;
    padding:12px;
    border:none;
    background:#e01020;
    color:#fff;
    font-family:'Oswald',sans-serif;
    font-size:18px;
    cursor:pointer;
}

/* Button hover effect */
button:hover{
    opacity:.9;
}

/* Back link */
.back{
    text-align:center;
    margin-top:20px;
}

/* Back link colour */
.back a{
    color:#e01020;
    text-decoration:none;
}

</style>
</head>

<body>
<div id="navbar"></div>
<!-- Website logo -->
<header>
    <a href="index.html">THE CANNON <span>POST</span></a>
</header>

<!-- Main page -->
<div class="page">

<!-- Subscription card -->
<div class="card">

<!-- Page heading -->
<h1>Subscribe</h1>

<!-- Short description -->
<p>Become a premium member and enjoy exclusive Arsenal content.</p>

<!-- Subscription plan -->
<div class="plan">
    <h2>Premium - £4.99/month</h2>

    <!-- Plan benefits -->
    <ul>
        <li>Exclusive transfer news</li>
        <li>Match analysis</li>
        <li>Early access to articles</li>
        <li>Ad-free experience</li>
    </ul>
</div>

<!-- Name input -->
<label>Full Name</label>
<input type="text" id="name" placeholder="Your name">

<!-- Email input -->
<label>Email</label>
<input type="email" id="email" placeholder="you@example.com">

<!-- Card number input -->
<label>Card Number</label>
<input type="text" id="card" placeholder="1234 5678 9012 3456">

<!-- Subscribe button -->
<button onclick="subscribe()">Subscribe Now</button>

<!-- Back to homepage -->
<div class="back">
    <a href="index.html">← Back to Home</a>
</div>

</div>

</div>

<div id="footer"></div>

<script>

// Runs when the button is clicked
function subscribe(){

    // Get user input
    const name=document.getElementById("name").value.trim();
    const email=document.getElementById("email").value.trim();
    const card=document.getElementById("card").value.trim();

    // Check if fields are empty
    if(name==="" || email==="" || card===""){
        alert("Please fill in all fields.");
        return;
    }

    // Success message
    alert("Thank you for subscribing to The Cannon Post!");

    // Go back to homepage
    window.location.href="index.html";
}

</script>

</body>
</html>
