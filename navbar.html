<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character encoding -->
    <meta charset="UTF-8">

    <!-- Makes the page responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title -->
    <title>Navbar – The Cannon Post</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <!-- Navbar stylesheet -->
    <link rel="stylesheet" href="./navbar.css">
</head>

<body>

<!-- Navigation bar -->
<nav class="site-navbar" id="siteNavbar">

    <!-- Website logo -->
    <a class="nav-logo" href="./index.html">
        THE CANNON <span>POST</span>
    </a>

    <!-- Mobile menu button -->
    <button class="nav-toggle" id="navToggle" aria-label="Toggle Menu">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <!-- Navigation links -->
    <ul class="nav-links" id="navLinks">

        <li>
            <a href="./index.html" class="active">Home</a>
        </li>

        <li>
            <a href="./news.html">News</a>
        </li>

        <!-- Videos dropdown -->
        <li class="has-dropdown">

            <a href="#">Videos</a>

            <ul class="dropdown-nav">

                <li>
                    <a href="./match_reactions.html">Match Reactions</a>
                </li>

                <li>
                    <a href="./tactics.html">Tactical Analysis</a>
                </li>

                <li>
                    <a href="./transfers.html">Transfer Talk</a>
                </li>

                <li>
                    <div class="divider"></div>
                </li>

                <li>
                    <a href="#">All Videos</a>
                </li>

            </ul>

        </li>

        <!-- More dropdown -->
        <li class="has-dropdown">

            <a href="#">More</a>

            <ul class="dropdown-nav">

                <li>
                    <a href="./community.html">Community</a>
                </li>

                <li>
                    <a href="./subscribe.html">Subscribe</a>
                </li>

                <li>
                    <div class="divider"></div>
                </li>

                <li>
                    <a href="./aboutUs.html">About Us</a>
                </li>

            </ul>

        </li>

        <!-- Right-side buttons -->
        <li class="nav-actions">

            <a href="./subscribe.html" class="subscribe-btn">
                Subscribe
            </a>

            <a href="./signup.html" class="signin-btn">
                Sign Up
            </a>

        </li>

    </ul>

</nav>

<!-- Navbar functionality -->
<script>

    // Navbar shadow on scroll
    const navbar = document.getElementById("siteNavbar");

    window.addEventListener("scroll", () => {
        navbar.classList.toggle("scrolled", window.scrollY > 40);
    });

    // Mobile menu
    const navToggle = document.getElementById("navToggle");
    const navLinks = document.getElementById("navLinks");

    navToggle.addEventListener("click", () => {
        navLinks.classList.toggle("open");
    });

    // Mobile dropdown menus
    document.querySelectorAll(".has-dropdown > a").forEach(link => {

        link.addEventListener("click", function(e){

            if(window.innerWidth <= 768){

                e.preventDefault();

                this.parentElement.classList.toggle("open-mobile");

            }

        });

    });

</script>

</body>
</html>
