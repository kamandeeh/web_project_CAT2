<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Cannon Post</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #111;
            color: white;
            font-family: Arial, sans-serif;
            padding-top: 70px;
        }

        .hero {
            text-align: center;
            padding: 120px 20px;
        }

        .hero h1 {
            font-size: 5rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .hero h1 span {
            color: #EF0107;
        }

        .hero p {
            max-width: 600px;
            margin: auto;
            color: #ccc;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .btn-red {
            background-color: #EF0107;
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }

        .btn-red:hover {
            background-color: #c50006;
            color: white;
        }
    </style>
</head>
<body>

    <div id="navbar"></div>

    <section class="hero">
        <h1>
            Your <span>Arsenal</span><br>
            Fan Channel
        </h1>

        <p>
            Match reactions, tactical analysis, transfer news,
            and everything Arsenal. Built by fans, for fans.
        </p>

        <a href="#" class="btn-red">
            Watch on YouTube
        </a>
    </section>

    <div id="footer"></div>

    <script src="js_files/layout.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
