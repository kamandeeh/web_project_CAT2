<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Cannon Post</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: #0D0D0D;
            color: #F5F5F5;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding-top: 70px; /* accounts for fixed navbar */
        }

        .hero {
            text-align: center;
            padding: 6rem 1.5rem;
            background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(239,1,7,0.15), transparent 70%);
        }
        .hero h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(3.5rem, 12vw, 7rem);
            line-height: 1;
            letter-spacing: 3px;
            margin-bottom: 1rem;
        }
        .hero h1 span { color: #EF0107; }
        .hero p {
            color: #888;
            max-width: 420px;
            margin: 0 auto 2rem;
            line-height: 1.7;
        }
        .btn-red {
            background: #EF0107;
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-decoration: none;
            transition: background 0.2s;
            display: inline-block;
        }
        .btn-red:hover { background: #c8000a; color: white; }
    </style>
</head>
<body>

    <div id="navbar"></div>

    <section class="hero">
        <h1>YOUR <span>ARSENAL</span><br>FAN CHANNEL</h1>
        <p>Match reactions, tactical breakdowns, and pure Gooner passion. No fluff. Just football.</p>
        <a href="#" class="btn-red">Watch on YouTube</a>
    </section>

    <div id="footer"></div>

    <script src="js_files/layout.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
