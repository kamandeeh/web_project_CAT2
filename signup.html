<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up – The Cannon Post</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:#111;
    color:#fff;
    display:flex;
    flex-direction:column;
    min-height:100vh;
}

header{
    background:#000;
    text-align:center;
    padding:20px;
    border-bottom:3px solid #e01020;
}

header a{
    text-decoration:none;
    color:#fff;
    font-family:'Oswald',sans-serif;
    font-size:30px;
}

header span{
    color:#e01020;
}

.page{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:360px;
    background:#1a1a1a;
    padding:30px;
    border-top:3px solid #e01020;
}

.card h1{
    font-family:'Oswald',sans-serif;
    margin-bottom:10px;
}

.card p{
    color:#888;
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:5px;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    background:#222;
    color:#fff;
    border:1px solid #444;
}

input:focus{
    border-color:#e01020;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#e01020;
    color:#fff;
    cursor:pointer;
    font-family:'Oswald',sans-serif;
    font-size:18px;
}

button:hover{
    opacity:.9;
}

.switch{
    text-align:center;
    margin-top:20px;
    color:#888;
}

.switch a{
    color:#e01020;
    text-decoration:none;
}
</style>
</head>

<body>

    <div id="navbar"></div>

<header>
    <a href="./index.html">THE CANNON <span>POST</span></a>
</header>

<div class="page">
    <div class="card">

        <h1>Create Account</h1>
        <p>Join The Cannon Post today.</p>

        <label>Full Name</label>
        <input type="text" id="name" placeholder="Your name">

        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com">

        <label>Password</label>
        <input type="password" id="password" placeholder="Password">

        <button onclick="signup()">Create Account</button>

        <div class="switch">
            Already have an account?
            <a href="./login.html">Sign In</a>
        </div>

    </div>
</div>

<script>
function signup(){
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if(name==="" || email==="" || password===""){
        alert("Please fill in all fields.");
        return;
    }

    alert("Account created successfully!");
    window.location.href="./index.html";
}
</script>

</body>
</html>
