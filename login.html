<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign In – The Cannon Post</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  /* Base */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; color: #fff; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

  /* Top logo bar */
  header { background: #0a0a0a; border-bottom: 3px solid #e01020; padding: 20px 24px; text-align: center; }
  header a { font-family: 'Oswald', sans-serif; font-size: 1.5rem; letter-spacing: 2px; color: #fff; text-decoration: none; }
  header a span { color: #e01020; }

  /* Center the card vertically */
  .page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }

  /* Login card */
  .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-top: 3px solid #e01020; padding: 36px; width: 100%; max-width: 400px; border-radius: 6px; }
  .card h1 { font-family: 'Oswald', sans-serif; font-size: 28px; font-weight: 700; margin-bottom: 6px; }
  .card p { color: #666; font-size: 14px; margin-bottom: 28px; }

  /* Form fields */
  label { display: block; font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: #888; margin-bottom: 6px; }
  input { width: 100%; background: #222; border: 1px solid #333; color: #fff; font-family: 'Inter', sans-serif; font-size: 14px; padding: 11px 14px; outline: none; margin-bottom: 18px; border-radius: 4px; }
  input:focus { border-color: #e01020; }
  input::placeholder { color: #555; }

  /* Forgot password link */
  .forgot { font-size: 12px; color: #666; text-align: right; margin-top: -12px; margin-bottom: 20px; }
  .forgot a { color: #e01020; text-decoration: none; }

  /* Submit button */
  button { width: 100%; background: #e01020; color: #fff; border: none; font-family: 'Oswald', sans-serif; font-size: 17px; font-weight: 700; letter-spacing: 1px; padding: 13px; cursor: pointer; border-radius: 4px; }
  button:hover { opacity: .85; }

  /* Divider between button and sign-up link */
  .divider { display: flex; align-items: center; gap: 12px; margin: 22px 0; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #2a2a2a; }
  .divider span { font-size: 12px; color: #555; }

  /* Link to signup page */
  .switch { text-align: center; font-size: 14px; color: #666; }
  .switch a { color: #e01020; text-decoration: none; font-weight: 600; }
</style>
</head>
<body>

<!-- Logo header -->
<header>
  <a href="./index.html">THE CANNON <span>POST</span></a>
</header>

<div class="page">
  <div class="card">
    <h1>Welcome Back</h1>
    <p>Sign in to your Cannon Post account</p>

    <!-- Email field -->
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="you@example.com"/>

    <!-- Password field -->
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••"/>

    <div class="forgot"><a href="#">Forgot password?</a></div>

    <button onclick="login()">Sign In</button>

    <div class="divider"><span>or</span></div>

    <!-- Link to signup page -->
    <div class="switch">Don't have an account? <a href="./signup.html">Sign up free</a></div>
  </div>
</div>

<script>
  function login() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();

    // Basic validation — in a real app this would call an API
    if (!email || !password) {
      alert('Please fill in all fields.');
      return;
    }
    alert('Signed in successfully!');
    window.location.href = './index.html';
  }
</script>
</body>
</html>
